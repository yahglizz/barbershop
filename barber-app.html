function DesignCanvas({ children }) {
  const vpRef = React.useRef(null);
  const worldRef = React.useRef(null);
  const tf = React.useRef({ x: 0, y: 0, scale: 1 });
  const apply = React.useCallback(() => {
    const { x, y, scale } = tf.current;
    const el = worldRef.current;
    if (el) el.style.transform = `translate3d(${x}px,${y}px,0) scale(${scale})`;
  }, []);
  React.useEffect(() => {
    const vp = vpRef.current;
    if (!vp) return;
    const zoomAt = (cx, cy, factor) => {
      const r = vp.getBoundingClientRect();
      const px = cx - r.left, py = cy - r.top;
      const t = tf.current;
      const next = Math.min(8, Math.max(0.1, t.scale * factor));
      const k = next / t.scale;
      t.x = px - (px - t.x) * k; t.y = py - (py - t.y) * k; t.scale = next; apply();
    };
    let isGesturing = false, gsBase = 1;
    const onWheel = (e) => {
      e.preventDefault();
      if (isGesturing) return;
      if (e.ctrlKey) { zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01)); }
      else if (e.deltaMode !== 0 || (e.deltaX === 0 && Number.isInteger(e.deltaY) && Math.abs(e.deltaY) >= 40)) { zoomAt(e.clientX, e.clientY, Math.exp(-Math.sign(e.deltaY) * 0.18)); }
      else { tf.current.x -= e.deltaX; tf.current.y -= e.deltaY; apply(); }
    };
    const onGS = (e) => { e.preventDefault(); isGesturing = true; gsBase = tf.current.scale; };
    const onGC = (e) => { e.preventDefault(); zoomAt(e.clientX, e.clientY, (gsBase * e.scale) / tf.current.scale); };
    const onGE = (e) => { e.preventDefault(); isGesturing = false; };
    let drag = null;
    const onPD = (e) => {
      const onBg = e.target === vp || e.target === worldRef.current;
      if (!(e.button === 1 || (e.button === 0 && onBg))) return;
      e.preventDefault(); vp.setPointerCapture(e.pointerId);
      drag = { id: e.pointerId, lx: e.clientX, ly: e.clientY }; vp.style.cursor = 'grabbing';
    };
    const onPM = (e) => {
      if (!drag || e.pointerId !== drag.id) return;
      tf.current.x += e.clientX - drag.lx; tf.current.y += e.clientY - drag.ly;
      drag.lx = e.clientX; drag.ly = e.clientY; apply();
    };
    const onPU = (e) => { if (!drag || e.pointerId !== drag.id) return; vp.releasePointerCapture(e.pointerId); drag = null; vp.style.cursor = ''; };
    vp.addEventListener('wheel', onWheel, { passive: false });
    vp.addEventListener('gesturestart', onGS, { passive: false });
    vp.addEventListener('gesturechange', onGC, { passive: false });
    vp.addEventListener('gestureend', onGE, { passive: false });
    vp.addEventListener('pointerdown', onPD);
    vp.addEventListener('pointermove', onPM);
    vp.addEventListener('pointerup', onPU);
    vp.addEventListener('pointercancel', onPU);
    return () => {
      vp.removeEventListener('wheel', onWheel);
      vp.removeEventListener('gesturestart', onGS);
      vp.removeEventListener('gesturechange', onGC);
      vp.removeEventListener('gestureend', onGE);
      vp.removeEventListener('pointerdown', onPD);
      vp.removeEventListener('pointermove', onPM);
      vp.removeEventListener('pointerup', onPU);
      vp.removeEventListener('pointercancel', onPU);
    };
  }, [apply]);
  const gridSvg = `url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M120 0H0v120' fill='none' stroke='${encodeURIComponent(DC.grid)}' stroke-width='1'/%3E%3C/svg%3E")`;
  return (
    <div ref={vpRef} style={{ height: '100vh', width: '100vw', background: DC.bg, overflow: 'hidden', overscrollBehavior: 'none', touchAction: 'none', position: 'relative', fontFamily: DC.font }}>
      <div ref={worldRef} style={{ position: 'absolute', top: 0, left: 0, transformOrigin: '0 0', willChange: 'transform', width: 'max-content', minWidth: '100%', minHeight: '100%', padding: '60px 0 80px', backgroundImage: gridSvg, backgroundSize: '120px 120px' }}>
        {children}
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Interactive iOS App Shell
// ─────────────────────────────────────────────────────────────
function InteractiveApp() {
  const [screen, setScreen] = React.useState(() => localStorage.getItem('fc_screen') || 'lock');
  const [selectedAppt, setSelectedAppt] = React.useState(null);
  React.useEffect(() => { localStorage.setItem('fc_screen', screen); }, [screen]);
  const go = (s) => setScreen(s);

  let view;
  if (screen === 'lock') view = <LockScreen onUnlock={() => go('schedule')} />;
  else if (screen === 'schedule') view = <ScheduleScreen onSelectAppt={(a) => { setSelectedAppt(a); go('detail'); }} />;
  else if (screen === 'detail') view = <ApptDetailScreen appt={selectedAppt} onBack={() => go('schedule')} />;
  else if (screen === 'earnings') view = <EarningsScreen />;
  else if (screen === 'availability') view = <AvailabilityScreen />;
  else if (screen === 'profile') view = <ProfileScreen />;

  const showTabBar = screen !== 'lock' && screen !== 'detail';
  const tabActive = screen === 'detail' ? 'schedule' : screen;

  return (
    <div style={{ position: 'relative' }}>
      <IOSDevice width={390} height={844}>
        <div style={{ minHeight: '100%', position: 'relative' }}>
          {view}
        </div>
      </IOSDevice>
      {showTabBar && (
        <div style={{ position: 'absolute', left: 0, right: 0, bottom: 0, borderBottomLeftRadius: 48, borderBottomRightRadius: 48, overflow: 'hidden' }}>
          <TabBar active={tabActive} onSelect={go} />
        </div>
      )}
    </div>
  );
}
